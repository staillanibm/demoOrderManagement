apiVersion: apps/v1
kind: Deployment
metadata:
  name: busybox-pvc-browser
  labels:
    app: busybox-pvc-browser
spec:
  replicas: 1
  selector:
    matchLabels:
      app: busybox-pvc-browser
  template:
    metadata:
      labels:
        app: busybox-pvc-browser
    spec:
      containers:
        - name: busybox
          image: busybox:latest
          command: ["sh", "-c", "while true; do sleep 3600; done"]
          volumeMounts:
            - name: msr-order-management-pvc
              mountPath: /data
      volumes:
        - name: msr-order-management-pvc
          persistentVolumeClaim:
            claimName: msr-order-management
