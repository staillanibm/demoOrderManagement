name: Build, push and deploy the image

on:
  workflow_dispatch:
  # push:
  #   branches:
  #     - main 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write
    outputs:
      image_tag: ${{ steps.set_tag.outputs.image_tag }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Log in to target Container Registry
      run: |
        echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ${{ vars.REGISTRY_URL }} -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin
      env:
        REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }} 
        REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }} 

    - name: Log in to base Container Registry
      run: |
        echo "${{ secrets.BASE_REGISTRY_PASSWORD }}" | docker login ${{ vars.BASE_REGISTRY_URL }} -u "${{ secrets.BASE_REGISTRY_USERNAME }}" --password-stdin
      env:
        REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }} 
        REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }} 

    - name: Build microservice Image
      run: |
        docker build -t ${{ vars.REGISTRY_URL }}/${{ vars.IMAGE_NAME }}:${{ vars.MAJOR_VERSION }}.${{ vars.MINOR_VERSION }}.${{ github.run_number }} --build-arg WPM_TOKEN=${{ secrets.WPM_TOKEN }} .

    - name: Push microservice Image
      run: |
        docker push ${{ vars.REGISTRY_URL }}/${{ vars.IMAGE_NAME }}:${{ vars.MAJOR_VERSION }}.${{ vars.MINOR_VERSION }}.${{ github.run_number }}

    - name: Save Tag for Later
      id: set_tag
      run: echo "image_tag=${{ vars.MAJOR_VERSION }}.${{ vars.MINOR_VERSION }}.${{ github.run_number }}" >> $GITHUB_OUTPUT

    - name: Tag repository
      run: |
        git tag ${{ vars.MAJOR_VERSION }}.${{ vars.MINOR_VERSION }}.${{ github.run_number }}
        git push origin ${{ vars.MAJOR_VERSION }}.${{ vars.MINOR_VERSION }}.${{ github.run_number }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up kubeconfig
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
        chmod 600 ~/.kube/config

    - name: Test cluster connectivity
      run: kubectl get nodes

    - name: Deploy
      run: |
        cd resources/kubernetes
        kustomize edit set image ${{ vars.REGISTRY_URL }}/${{ vars.IMAGE_NAME }}=${{ vars.REGISTRY_URL }}/${{ vars.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}
        kubectl apply -k . -n ${{ vars.KUBE_NAMESPACE }}
        kubectl rollout status deployment/${{ vars.DEPLOYMENT_NAME }} -n ${{ vars.KUBE_NAMESPACE }} --timeout=5m

    - name: Sanity check
      run: |
        PODS=$(kubectl get pods -l app=${{ vars.DEPLOYMENT_NAME }} -n ${{ vars.KUBE_NAMESPACE }} -o json | jq -r '.items[] | select(.metadata.deletionTimestamp == null) | select(.status.containerStatuses[0].ready == true) | .metadata.name')
        for POD in $PODS; do
          echo "Checking $POD..."
          STATUS=$(kubectl exec $POD -n ${{ vars.KUBE_NAMESPACE }} -- curl -s -o /dev/null -w "%{http_code}" http://localhost:5555/health)
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed on $POD: HTTP $STATUS"
            exit 1
          fi
          echo "$POD: OK"
        done
        
  test:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up kubeconfig
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
        chmod 600 ~/.kube/config

    - name: Retrieve test credentials
      run: |
        ROUTE_HOST=$(kubectl get route ${{ vars.DEPLOYMENT_NAME }} -n ${{ vars.KUBE_NAMESPACE }} -o jsonpath='{.spec.host}' 2>/dev/null || true)
        if [ -n "$ROUTE_HOST" ]; then
          echo "ROOT_URL=https://${ROUTE_HOST}" >> $GITHUB_ENV
        else
          INGRESS_HOST=$(kubectl get ingress ${{ vars.DEPLOYMENT_NAME }} -n ${{ vars.KUBE_NAMESPACE }} -o jsonpath='{.spec.rules[0].host}')
          echo "ROOT_URL=https://${INGRESS_HOST}" >> $GITHUB_ENV
        fi
        TESTER_PASSWORD=$(kubectl get secret ${{ vars.DEPLOYMENT_NAME }} -n ${{ vars.KUBE_NAMESPACE }} -o jsonpath='{.data.TESTER_PASSWORD}' | base64 -d)
        echo "::add-mask::$TESTER_PASSWORD"
        echo "TESTER_PASSWORD=$TESTER_PASSWORD" >> $GITHUB_ENV

    - name: Test - File inbound channel
      run: |
        OUTPUT=$(KUBE_NAMESPACE=${{ vars.KUBE_NAMESPACE }} bash ./resources/tests/injectFile.sh)
        echo "$OUTPUT"
        echo "FILE_ORDER_ID_1=$(echo "$OUTPUT" | grep ORDER_ID_1 | cut -d= -f2)" >> $GITHUB_ENV
        echo "FILE_ORDER_ID_2=$(echo "$OUTPUT" | grep ORDER_ID_2 | cut -d= -f2)" >> $GITHUB_ENV

    - name: Test - REST API inbound channel
      run: |
        TS=$(date +%Y%m%d-%H%M%S)
        TS=$TS ISO_TS=$(date +%Y-%m-%dT%H:%M:%S.000) ROOT_URL=$ROOT_URL API_USER=tester API_PASSWORD=$TESTER_PASSWORD \
          bash ./resources/tests/postOrder.sh
        echo "API_ORDER_ID=ORD-${TS}" >> $GITHUB_ENV

    - name: Wait for processing
      run: sleep 30

    - name: Verify - File orders persisted
      run: |
        for ORDER_ID in "$FILE_ORDER_ID_1" "$FILE_ORDER_ID_2"; do
          ROOT_URL=$ROOT_URL API_USER=tester API_PASSWORD=$TESTER_PASSWORD ORDER_ID=$ORDER_ID \
            bash ./resources/tests/getOrderById.sh
        done

    - name: Verify - API order persisted
      run: |
        ROOT_URL=$ROOT_URL API_USER=tester API_PASSWORD=$TESTER_PASSWORD ORDER_ID=$API_ORDER_ID \
          bash ./resources/tests/getOrderById.sh
